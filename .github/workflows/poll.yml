name: TPIMS poller

on:
  schedule:
    - cron: "3 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: tpims-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Poll loop (every 15 min for ~5.5h)
        run: |
          git config user.name "tpims-poller"
          git config user.email "parkalive.app@gmail.com"
          end=$(( $(date +%s) + 19800 ))
          while [ "$(date +%s)" -lt "$end" ]; do
            python poll_tpims.py || true
            git add data/
            git commit -m "poll $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]" || true
            git pull --rebase origin main || true
            git push || true
            sleep 900
          done

      - name: Re-trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run poll.yml --ref main || true
