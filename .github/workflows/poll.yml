name: TPIMS poller

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tpims-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Poll TPIMS feeds
        run: python poll_tpims.py

      - name: Commit data
        run: |
          git config user.name "tpims-poller"
          git config user.email "parkalive.app@gmail.com"
          git add data/
          git diff --cached --quiet || git commit -m "poll $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]"
          git pull --rebase origin main || true
          git push
