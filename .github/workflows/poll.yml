name: TPIMS poller

# GitHub's built-in 15-min timer is unreliable on free repos, so instead:
#  - each run polls every 15 min for ~5.5h (internal loop),
#  - then re-triggers itself (chain),
#  - a coarse 6h cron is a backup safety net in case the chain ever breaks.
on:
  schedule:
    - cron: "3 */6 * * *"   # backup kick every 6h (coarse crons are more reliable)
  workflow_dispatch: {}       # manual start (use this to kick off the chain)

permissions:
  contents: write
  actions: write              # needed to re-trigger the next run

concurrency:
  group: tpims-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest    # US runner → TPIMS feeds respond
    timeout-minutes: 350      # ~5h50m, under GitHub's 6h job limit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Poll loop (every 15 min for ~5.5h)
        run: |
          git config user.name "tpims-poller"
          git config user.email "parkalive.app@gmail.com"
          end=$(( $(date +%s) + 19800 ))   # 5.5 hours from now
          while [ "$(date +%s)" -lt "$end" ]; do
            python poll_tpims.py || true
            git add data/
            git commit -m "poll $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]" || true
            git pull --rebase origin main || true
            git push || true
            sleep 900
          done

      - name: Re-trigger next run (keep the chain going)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run poll.yml --ref main || true
